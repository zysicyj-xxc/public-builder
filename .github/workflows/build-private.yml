        uses: docker/setup-buildx-action@v3
      - name: build+deploy
        env:
          CCR_USERNAME: ${{ secrets.CCR_USERNAME }}
          CCR_PASSWORD: ${{ secrets.CCR_PASSWORD }}
          WEBHOOK_DEPLOY_KEY: ${{ secrets.WEBHOOK_DEPLOY_KEY }}
        run: |
          $ErrorActionPreference = 'Stop'
          docker version
          & ./scripts/deploy-all-docker-prod.ps1 -Target web -EnvName prod -Deploy
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

  backend:
    name: backend
    needs: validate
    if: ${{ contains(needs.validate.outputs.jobs, ',backend,') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          repository: zysicyj-xxc/zysicyj
          token: ${{ secrets.PRIVATE_REPO_ACCESS_TOKEN }}
          ref: ${{ needs.validate.outputs.ref }}
          persist-credentials: false
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum
      - name: build+deploy (native systemd)
        env:
          DAYMICA_RUSTFS_ACCESS_KEY: ${{ secrets.DAYMICA_RUSTFS_ACCESS_KEY }}
          DAYMICA_RUSTFS_SECRET_KEY: ${{ secrets.DAYMICA_RUSTFS_SECRET_KEY }}
          RUSTFS_ACCESS_KEY: ${{ secrets.DAYMICA_RUSTFS_ACCESS_KEY }}
          RUSTFS_SECRET_KEY: ${{ secrets.DAYMICA_RUSTFS_SECRET_KEY }}
          WEBHOOK_DEPLOY_KEY: ${{ secrets.WEBHOOK_DEPLOY_KEY }}
        run: |
          $ErrorActionPreference = 'Stop'
          & ./scripts/deploy-backend-native-prod.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

