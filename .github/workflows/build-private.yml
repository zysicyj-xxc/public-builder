            ~/.config/shorebird
            ~/.shorebird
          key: ${{ runner.os }}-android-yaoxiaobai-${{ hashFiles('apps/yaoxiaobai/yaoxiaobai_app/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-android-yaoxiaobai-
            ${{ runner.os }}-android-
      - name: Install Shorebird
        shell: bash
        run: |
          set -euo pipefail
          if [ -x "$HOME/.config/shorebird/bin/shorebird" ]; then
            echo "$HOME/.config/shorebird/bin" >> "$GITHUB_PATH"
          elif [ -x "$HOME/.shorebird/bin/shorebird" ]; then
            echo "$HOME/.shorebird/bin" >> "$GITHUB_PATH"
          else
            curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/shorebirdtech/install/main/install.sh | bash
            if [ -x "$HOME/.config/shorebird/bin/shorebird" ]; then
              echo "$HOME/.config/shorebird/bin" >> "$GITHUB_PATH"
            else
              echo "$HOME/.shorebird/bin" >> "$GITHUB_PATH"
            fi
          fi
      - name: build
        env:
          APP_VERSION: ${{ needs.validate.outputs.yaoxiaobai_version }}
          APP_BUILD: ${{ needs.validate.outputs.yaoxiaobai_build }}
          APP_MODE: ${{ needs.validate.outputs.mode }}
          ZYSICYJ_BACKEND_HOST: ${{ needs.validate.outputs.backend_url }}
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
          YAOXIAOBAI_RELEASE_TOKEN: ${{ secrets.YAOXIAOBAI_RELEASE_TOKEN }}
          RUSTFS_ACCESS_KEY: ${{ secrets.DAYMICA_RUSTFS_ACCESS_KEY }}
          RUSTFS_SECRET_KEY: ${{ secrets.DAYMICA_RUSTFS_SECRET_KEY }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:APP_BUILD -notmatch '^[0-9]{1,16}$') { throw 'invalid APP_BUILD' }
          $a = @{ Version = $env:APP_VERSION; BuildNumber = [int]$env:APP_BUILD }
          if ($env:APP_MODE -eq 'patch') { $a['Patch'] = $true }
          & ./scripts/build-yaoxiaobai-android-prod.ps1 @a
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

